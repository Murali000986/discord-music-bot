  - path: "artifacts/discord-music-bot/public/images/server-logo-3.png"
    description: "Futuristic music note emblem in glowing purple, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/discord-music-bot/public/images/server-logo-4.png"
