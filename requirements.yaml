packages:
  "framer-motion": "Needed for smooth scroll animations, revealing elements, and complex interactive UI transitions"
  "lucide-react": "For crisp, beautiful SVG icons used throughout the interface"
  "clsx": "Utility for conditionally joining classNames together"
  "tailwind-merge": "Utility to resolve Tailwind CSS class conflicts"

